# netlify.toml

# Esta seção informa à Netlify onde encontrar suas funções de backend.
[functions]
  directory = "netlify/functions/"

# CORREÇÃO: Usamos [functions.NOME_DA_FUNCAO] para definir um objeto de configuração para a função.
[functions.generateDailyChallenges]
  # A propriedade 'schedule' pertence a este objeto de configuração.
  schedule = "0 3 * * *"